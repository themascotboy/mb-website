<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MascotBoy | Custom Mascot Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'mascot-yellow': '#FFC107', 
              'mascot-warm': '#FFB300',
              'mascot-black': '#121214',
              'mascot-dark': '#1E1E22',
              'mascot-gray': '#F8F9FA',
              'accent-blue': '#4F46E5',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Outfit', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              'xl': '0.75rem',
              '2xl': '1rem',
              '3xl': '1.25rem',
              '4xl': '1.5rem',
            },
            boxShadow: {
              'subtle': '0 2px 10px rgba(0, 0, 0, 0.05)',
              'elevated': '0 10px 30px -5px rgba(0, 0, 0, 0.1)',
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'enter-up': 'enterUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'marquee': 'marquee 40s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              enterUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
      h1, h2, h3, h4, .font-display { font-family: 'Outfit', sans-serif; }
      
      .stroke-text-subtle {
        -webkit-text-stroke: 1px currentColor;
        color: transparent;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white text-mascot-black antialiased selection:bg-mascot-yellow/30 overflow-x-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
